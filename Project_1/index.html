<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Iintoo Registration Page</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img src="./bg.jpg" alt="The main photo of the page" class="main-img">
            <img src="./logo.svg" alt="Iintoo logo" class="logo-img">
        </div>

        <main class="form">
            <h1>Get iintoo it today</h1>
            <p class="subtitle">There is no charge or obligation upon registration.</p>
            <br>
            <div class="social-buttons">
                <button class="facebook-btn">
                    <img src="./facebook.svg" alt="Facebook logo" class="btn-logo">
                    Register with Facebook
                </button>
                    <button class="linkedin-btn">
                    <img src="./linkedin.svg" alt="LinkedIn Logo" class="btn-logo">
                    Register with LinkedIn
                </button>
                </div>
                <br>
            <div class="divider">OR</div>
            <br>
            <form>
                <div class="input-group">
                    <input type="email" placeholder="Email">
                    <input type="number" placeholder="Phone">
                </div>

                <h3>What type of investor are you?</h3>
                <p>Select what type of investor you are below.</p>
                <div class="investor-group">
                    <label><input type="radio" name="investor" checked>Individual</label>
                    <label><input type="radio" name="investor">Business</label>
                    <label><input type="radio" name="investor">IRA</label>
                    <label><input type="radio" name="investor">Trust</label>
                </div>

                <p class="hint">I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.</p>
                <br>
                <label class="checkbox">
                    <input type="checkbox">I agree to the terms and receiving notifications from iintoo 
                    <span class="linked-text">View full items</span>
                </label>

                <br>
                <button class="submission-btn" type="submit">Create Account</button>
            </form>
        </main>
    </div>
</body>
</html>
